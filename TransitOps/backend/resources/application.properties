# Supabase PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://[YOUR_SUPABASE_HOST].supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=[YOUR_SUPABASE_PASSWORD]
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=transitopsSecretKey2024Hackathon
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000