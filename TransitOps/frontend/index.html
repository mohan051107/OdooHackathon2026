<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransitOps · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <div class="brand-icon">
                    <i class="fas fa-bus"></i>
                </div>
                <h1>TransitOps</h1>
                <p>Fleet Management System</p>
            </div>
            <div class="login-features">
                <div class="feature">
                    <i class="fas fa-route"></i>
                    <span>Real-time Fleet Tracking</span>
                </div>
                <div class="feature">
                    <i class="fas fa-chart-line"></i>
                    <span>Advanced Analytics</span>
                </div>
                <div class="feature">
                    <i class="fas fa-tools"></i>
                    <span>Maintenance Management</span>
                </div>
                <div class="feature">
                    <i class="fas fa-users"></i>
                    <span>Driver Management</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-card">
                <div class="login-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to access your dashboard</p>
                </div>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="admin@transitops.com" value="admin@transitops.com" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" value="admin123" required />
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" checked />
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                </form>
                <div class="login-footer">
                    <p>Demo Credentials: <strong>admin@transitops.com</strong> / <strong>admin123</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
